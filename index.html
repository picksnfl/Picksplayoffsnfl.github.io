<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Picks NFL — Playoffs</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  padding:15px 20px;
  background:linear-gradient(90deg, #142d63, #7a1033, #b91d22);
  border-bottom:2px solid rgba(255,255,255,.2);
}

.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.header-left img{
  width:55px;
  height:55px;
}

h1{
  margin:0;
  font-size:22px;
  font-weight:800;
}

.btns{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btns button{
  padding:7px 14px;
  border-radius:10px;
  border:1px solid #3a3a3a;
  background:#ffffff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

#wrapper{
  overflow-x:auto;
  padding:15px;
}

#bracket{
  display:flex;
  gap:25px;
  min-width:1100px;
  margin:auto;
}

.round{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.round-title{
  text-align:center;
  font-weight:bold;
  margin-bottom:5px;
}

/* Marco del partido */
.game{
  padding:8px;
  border:2px dashed #3a3a3a;
  border-radius:14px;
  background:#0e0e0e;
}

.game-title{
  text-align:center;
  font-size:12px;
  opacity:.8;
  margin-bottom:4px;
}

/* Dentro del partido (dos equipos) */
.match{
  background:#151515;
  border:1px solid #333;
  border-radius:12px;
  padding:8px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.team{
  display:flex;
  align-items:center;
  gap:8px;
}

.team img{
  width:40px;
  height:40px;
  object-fit:contain;
}

select{
  flex:1;
  background:#0e0e0e;
  color:white;
  border-radius:6px;
  border:1px solid #3a3a3a;
}

.super{ border-color:#ffd33d; }
.champ{ border-color:#38ff6d; }
  #champ img{
  width:60px;
  height:60px;
  object-fit:contain;
  margin:auto;
  display:block;
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="https://a.espncdn.com/i/teamlogos/leagues/500/nfl.png">
    <h1>Picks Playoffs</h1>
  </div>

  <div class="btns">
    <button onclick="resetAll()">Reiniciar</button>
    <button onclick="saveImage()">Descargar</button>
  </div>
</header>

<div id="wrapper">
  <div id="bracket"></div>
</div>

<script>
const teams = {
  // NFC
  "49ers":"https://a.espncdn.com/i/teamlogos/nfl/500/sf.png",
  "Cowboys":"https://a.espncdn.com/i/teamlogos/nfl/500/dal.png",
  "Eagles":"https://a.espncdn.com/i/teamlogos/nfl/500/phi.png",
  "Lions":"https://a.espncdn.com/i/teamlogos/nfl/500/det.png",
  "Packers":"https://a.espncdn.com/i/teamlogos/nfl/500/gb.png",
  "Vikings":"https://a.espncdn.com/i/teamlogos/nfl/500/min.png",
  "Giants":"https://a.espncdn.com/i/teamlogos/nfl/500/nyg.png",
  "Commanders":"https://a.espncdn.com/i/teamlogos/nfl/500/wsh.png",
  "Falcons":"https://a.espncdn.com/i/teamlogos/nfl/500/atl.png",
  "Saints":"https://a.espncdn.com/i/teamlogos/nfl/500/no.png",
  "Buccaneers":"https://a.espncdn.com/i/teamlogos/nfl/500/tb.png",
  "Seahawks":"https://a.espncdn.com/i/teamlogos/nfl/500/sea.png",
  "Rams":"https://a.espncdn.com/i/teamlogos/nfl/500/lar.png",
  "Cardinals":"https://a.espncdn.com/i/teamlogos/nfl/500/ari.png",
  "Bears":"https://a.espncdn.com/i/teamlogos/nfl/500/chi.png",
  "Panthers":"https://a.espncdn.com/i/teamlogos/nfl/500/car.png",

  // AFC
  "Chiefs":"https://a.espncdn.com/i/teamlogos/nfl/500/kc.png",
  "Bills":"https://a.espncdn.com/i/teamlogos/nfl/500/buf.png",
  "Ravens":"https://a.espncdn.com/i/teamlogos/nfl/500/bal.png",
  "Dolphins":"https://a.espncdn.com/i/teamlogos/nfl/500/mia.png",
  "Bengals":"https://a.espncdn.com/i/teamlogos/nfl/500/cin.png",
  "Jaguars":"https://a.espncdn.com/i/teamlogos/nfl/500/jax.png",
  "Steelers":"https://a.espncdn.com/i/teamlogos/nfl/500/pit.png",
  "Chargers":"https://a.espncdn.com/i/teamlogos/nfl/500/lac.png",
  "Raiders":"https://a.espncdn.com/i/teamlogos/nfl/500/lv.png",
  "Broncos":"https://a.espncdn.com/i/teamlogos/nfl/500/den.png",
  "Jets":"https://a.espncdn.com/i/teamlogos/nfl/500/nyj.png",
  "Patriots":"https://a.espncdn.com/i/teamlogos/nfl/500/ne.png",
  "Texans":"https://a.espncdn.com/i/teamlogos/nfl/500/hou.png",
  "Colts":"https://a.espncdn.com/i/teamlogos/nfl/500/ind.png",
  "Titans":"https://a.espncdn.com/i/teamlogos/nfl/500/ten.png",
  "Browns":"https://a.espncdn.com/i/teamlogos/nfl/500/cle.png"
};

const options =
  `<option value="">—</option>` +
  Object.keys(teams).sort().map(t => `<option>${t}</option>`).join("");

const bracket = document.getElementById("bracket");

function createTeamRow(key){
  const row = document.createElement("div");
  row.className = "team";

  const img = document.createElement("img");
img.crossOrigin = "anonymous";
  const sel = document.createElement("select");

  sel.dataset.key = key;
  sel.innerHTML = options;

  function setPlaceholder(){
    if(key.includes("AFC"))
      img.src = "https://upload.wikimedia.org/wikipedia/commons/7/7a/American_Football_Conference_logo.svg";
    else if(key.includes("NFC"))
      img.src = "https://upload.wikimedia.org/wikipedia/commons/6/6f/National_Football_Conference_logo.svg";
  }

  const saved = localStorage.getItem(key);

  if(saved){
    sel.value = saved;
    img.src = teams[saved];
  } else {
    setPlaceholder();
  }

  sel.onchange = ()=>{
    const v = sel.value;
    localStorage.setItem(key,v);
    img.src = v ? teams[v] : "";
    if(!v) setPlaceholder();
    updateSuper();
  };

  row.appendChild(img);
  row.appendChild(sel);

  return row;
}

function createMatch(key){
  const game = document.createElement("div");
  game.className = "game";

  const title = document.createElement("div");
  title.className = "game-title";
  title.textContent = "Juego";

  const match = document.createElement("div");
  match.className = "match";

  match.appendChild(createTeamRow(key+"-A"));
  match.appendChild(createTeamRow(key+"-B"));

  game.appendChild(title);
  game.appendChild(match);

  return game;
}

function build(){
  const rounds = [
    {title:"AFC R1", count:3},
    {title:"AFC R2", count:2},
    {title:"AFC R3", count:1},

    {title:"SUPER BOWL", center:true},

    {title:"NFC R3", count:1},
    {title:"NFC R2", count:2},
    {title:"NFC R1", count:3}
  ];

  rounds.forEach(r=>{
    const col=document.createElement("div");
    col.className="round";

    const t=document.createElement("div");
    t.className="round-title";
    t.textContent=r.title;
    col.appendChild(t);

    if(r.center){
      const sb = createMatch("SB");
      sb.classList.add("super");

      const champ = document.createElement("div");
champ.className = "match champ";
champ.id = "champ";

const title = document.createElement("div");
title.innerHTML = "<strong>Campeón</strong>";
champ.appendChild(title);

const champImg = document.createElement("img");
champImg.id = "champ-img";
champ.appendChild(champImg);

const champSelect = document.createElement("select");
champSelect.id = "champ-select";
champSelect.innerHTML = options;
champ.appendChild(champSelect);

function setDefaultChamp() {
  champImg.src = "https://a.espncdn.com/i/teamlogos/leagues/500/nfl.png";
}

const savedChamp = localStorage.getItem("SB-CHAMP");

if (savedChamp) {
  champSelect.value = savedChamp;
  champImg.src = teams[savedChamp];
} else {
  setDefaultChamp();
}

champSelect.onchange = () => {
  const v = champSelect.value;
  localStorage.setItem("SB-CHAMP", v);
  champImg.src = v ? teams[v] : setDefaultChamp();
};

      col.appendChild(sb);
      col.appendChild(champ);
    } else {
      for(let x=0;x<r.count;x++){
        col.appendChild(createMatch(`${r.title}-${x}`));
      }
    }

    bracket.appendChild(col);
  });
}

function updateSuper(){
  // ahora ya no toca el campeón,
  // porque tiene su propio select
}

function resetAll(){
  localStorage.clear();
  location.reload();
}

function saveImage(){
  const area = document.getElementById("bracket");

  html2canvas(area, {
    backgroundColor: null,
    scale: 2,
    width: area.scrollWidth,
    height: area.scrollHeight,
    windowWidth: area.scrollWidth,
    windowHeight: area.scrollHeight,
    useCORS: true
  }).then(canvas=>{
    const link = document.createElement("a");
    link.download = "nfl-picks.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

build();
updateSuper();
</script>

</body>
</html>
<!-- update -->
